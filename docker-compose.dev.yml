services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./redis_data:/data
    env_file:
      - .env

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - .:/app   # live reload via --reload
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app.celery_app beat --loglevel=info

