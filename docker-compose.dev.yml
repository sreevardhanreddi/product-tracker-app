services:
  postgres:
    image: postgres:16-alpine
    user: "1000:1000"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./redis_data:/data
    env_file:
      - .env

  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"
    cpus: 0.5
    mem_limit: 512m

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8003:8000"
    env_file:
      - .env
    volumes:
      - .:/app   # live reload via --reload
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    cpus: 0.5
    mem_limit: 512m

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    cpus: 1.0
    mem_limit: 1g

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app.celery_app beat --loglevel=info
    cpus: 0.25
    mem_limit: 256m
