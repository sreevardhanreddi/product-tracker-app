x-default-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *default-logging
    image: postgres:16-alpine
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    <<: *default-logging
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ./redis_data:/data
    env_file:
      - .env

  migrate:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"
    cpus: 0.5
    mem_limit: 512m

  app:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8015:8000"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m

  celery_worker:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    cpus: 1.0
    mem_limit: 1g

  celery_beat:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A tasks.celery_app.celery_app beat --loglevel=info
    cpus: 0.25
    mem_limit: 256m

  # Optional: Adminer for database management
  adminer:
    <<: *default-logging
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8016:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
